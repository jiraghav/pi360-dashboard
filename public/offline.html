<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f16" />
    <title>Offline — PI360</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f16;
        --card: #0e1420;
        --stroke: #1b2534;
        --ink: #e6edf3;
        --mute: #9aa8bd;
        --accent: #38bdf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, rgba(56, 189, 248, 0.12), transparent 60%),
          radial-gradient(1000px 600px at 120% 10%, rgba(167, 139, 250, 0.1), transparent 60%), var(--bg);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
      }
      .card {
        max-width: 22rem;
        width: 100%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 40%), var(--card);
        border: 1px solid var(--stroke);
        border-radius: 16px;
        padding: 1.75rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: var(--mute);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 1px solid var(--stroke);
        border-radius: 12px;
        padding: 0.65rem 1.1rem;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        background: linear-gradient(90deg, #38bdf8, #34d399);
        color: #06111d;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>PI360 could not reach the network. Check your connection, then try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
