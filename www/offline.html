<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>CIC Dashboard</title>
    <script src="./_dashboard_url.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, rgba(56, 189, 248, 0.12), transparent 60%),
          radial-gradient(1000px 600px at 120% 10%, rgba(167, 139, 250, 0.1), transparent 60%), #0b0f16;
        color: #c8d2e3;
      }
      .panel {
        width: 100%;
        max-width: 20rem;
        text-align: center;
        padding: 2rem 1.5rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 40%), #0e1420;
        border: 1px solid #1b2534;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .title {
        margin: 0 0 1.5rem;
        font-size: 1.125rem;
        font-weight: 600;
        color: #e2e8f0;
        letter-spacing: 0.01em;
      }
      button {
        width: 100%;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        color: #06111d;
        background: linear-gradient(90deg, #38bdf8, #34d399);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      }
      button:active {
        transform: translateY(0);
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <p class="title">You're offline</p>
      <button type="button" id="retry">Try again</button>
    </div>
    <script>
      (function () {
        const btn = document.getElementById("retry");
        btn.addEventListener("click", function () {
          if (navigator.onLine === false) return;
          const url =
            typeof window.__CIC_OFFLINE_DASHBOARD_URL === "string"
              ? window.__CIC_OFFLINE_DASHBOARD_URL
              : "";
          if (!url) return;
          btn.disabled = true;
          window.location.replace(url);
        });
      })();
    </script>
  </body>
</html>
